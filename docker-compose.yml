  #     - CORS_ORIGINS=http://localhost:3000
  #   volumes:
  #     - ./app/data:/app/data
  #   restart: unless-stopped
  #   profiles:
  #     - production

networks:
  default:
    name: scheme-advisor-network
    driver: bridge

volumes:
  node_modules:
  data:
